# Watson's agents (spec §22): player-type actors. Hunters deplete the
# same scav populations the player would; merchants arbitrage the same
# markets; aggressors patrol turf and kill each other for real —
# permadeath, robbery, chronicle entries, faction standing hits.
- id: npc.cp_scorpion
  name: "Scorpion"
  location: loc.cp_totentanz
  actor_class: agent
  policy: hunter_gatherer
  capabilities: [hunt, trade, combat]
  faction: fac.cp_maelstrom
  col: 120
  combat: { level: 6, skills: [] }
  policy_params:
    species: mon.cp_scav
    zone: zone.cp_northside_ruins
    home: loc.cp_totentanz
    sell_at: loc.cp_afterlife
- id: npc.cp_dum_dum
  name: "Dum Dum"
  location: loc.cp_totentanz
  actor_class: agent
  policy: aggressor
  capabilities: [combat]
  faction: fac.cp_maelstrom
  col: 150
  combat: { level: 7, skills: [] }
  policy_params:
    turf: [loc.cp_totentanz, loc.cp_afterlife, loc.cp_kabuki_market]
