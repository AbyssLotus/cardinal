# Tier-1 canon: directly established by official SAO material. Immutable
# definitions — state may evolve (Illfang can be killed) but these facts
# can never be contradicted by generated content.
- "Aincrad is a floating castle of 100 floors; each floor unlocks only when its labyrinth boss is defeated."
- "HP reaching 0 means character deletion. Death is permanent."
- "Safe zones (towns) prevent all combat damage."
- "Ten thousand players were trapped at launch on November 6, 2022."
- "Sword skills impose a post-motion delay ('the freeze') proportional to their power."
- "Teleport gates connect the main settlement of each unlocked floor."
- "Illfang the Kobold Lord is the boss of Floor 1's labyrinth."
- "The Secret Medicine of the Forest quest in Horunka rewards the Anneal Blade."
